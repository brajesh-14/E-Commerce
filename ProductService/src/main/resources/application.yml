        name: ProductService

    datasource:
        url: jdbc:mysql://localhost:3306/product-service?useUnicode=true&useLegacyDatetimeCode=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=true
