      show-sql: true

    devtools:
      restart:
        enabled: true

    security:
      user:
        name: brajesh
        password: brajesh

eureka:
  client:
    service-url:
      defaultzone: http://localhost:8761/eureka/
      register-with-eureka: true
      fetch-registry: true

server:
  port: 8081

