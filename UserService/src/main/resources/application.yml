spring:
    application:
        name: UserService

    datasource:
      url: jdbc:mysql://localhost:3306/user-service?useUnicode=true&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      username: root
      password: root
      driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
